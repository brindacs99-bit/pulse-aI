# ===============================
# Pulse.ai – Server Monitoring & Forecasting System
# ===============================
name: pulse-ai

services:

  # -------------------------------
  # Node Exporter (System Metrics)
  # -------------------------------
  node-exporter:
    image: prom/node-exporter:latest
    container_name: pulse-node-exporter
    restart: unless-stopped
    network_mode: "host"
    pid: "host"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.ignored-mount-points=^/(sys|proc|dev|host|etc)($|/)

  # -------------------------------
  # Prometheus (Metric Scraper)
  # -------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: pulse-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  # -------------------------------
  # Grafana (Visualization)
  # -------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: pulse-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: Pulse@123
      GF_USERS_ALLOW_SIGN_UP: "false"

      # 🔑 REQUIRED for embedding Grafana in Streamlit
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      GF_SECURITY_ALLOW_EMBEDDING: "true"

      GF_APPLICATION_TITLE: "Pulse.ai Monitoring"
    volumes:
      - grafana_data:/var/lib/grafana

  # -------------------------------
  # InfluxDB (Time-Series Database)
  # -------------------------------
  influxdb:
    image: influxdb:2.7
    container_name: pulse-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: PulseInflux@123
      DOCKER_INFLUXDB_INIT_ORG: pulse-ai
      DOCKER_INFLUXDB_INIT_BUCKET: metrics
      DOCKER_INFLUXDB_INIT_RETENTION: 7d
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: pulse-ai-secure-token
    volumes:
      - influxdb_data:/var/lib/influxdb2

  # -------------------------------
  # Telegraf (Metric Collector)
  # -------------------------------
  telegraf:
    image: telegraf:latest
    container_name: pulse-telegraf
    restart: unless-stopped
    depends_on:
      - influxdb
      - node-exporter
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro

  # -------------------------------
  # MLflow (Experiment Tracking)
  # -------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: pulse-mlflow
    restart: unless-stopped
    ports:
      - "5050:5000"
    volumes:
      - ./mlruns:/mlruns
      - ./artifacts:/artifacts
    command: >
      mlflow server
      --backend-store-uri file:///mlruns
      --default-artifact-root file:///artifacts
      --host 0.0.0.0
      --port 5000

  # -------------------------------
  # Streamlit (Main Website)
  # -------------------------------
  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: pulse-streamlit
    restart: unless-stopped
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./artifacts:/app/artifacts
      - ./app.py:/app/app.py
    environment:
      PYTHONPATH: /app
    depends_on:
      - mlflow
      - grafana
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8501

# -------------------------------
# Volumes
# -------------------------------
volumes:
  prometheus_data:
  grafana_data:
  influxdb_data: